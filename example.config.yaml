mixed-port: 7890
allow-lan: true
bind-address: "*"
mode: rule
log-level: info
ipv6: false
unified-delay: true
tcp-concurrent: true
find-process-mode: strict
global-client-fingerprint: chrome
external-ui: /etc/mihomo/ui
external-controller: 0.0.0.0:9090
secret: "这里是面板密码"

profile:
  store-selected: true
  store-fake-ip: true

dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - 223.5.5.5
    - 119.29.29.29
  fallback:
    - 223.5.5.5
    - 119.29.29.29
  fallback-filter:
    geoip: true
    geoip-code: CN
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - localhost
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"

tun:
  enable: true
  stack: system
  auto-route: true
  auto-detect-interface: true
  strict-route: false
  dns-hijack:
    - any:53

proxy-providers:
  Remnawave:
    type: http
    url: "这里是订阅URL"
    path: ./proxy_providers/remnawave.yaml
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
      timeout: 5000
      lazy: true
    override:
      additional-prefix: "Remnawave | "
      udp: true
    exclude-filter: "(?i)官网|流量|套餐|剩余|到期|过期|traffic|expire"

proxies: []

proxy-groups:
  - name: Proxy
    type: select
    proxies:
      - Auto
      - DIRECT
    use:
      - Remnawave

  - name: Auto
    type: url-test
    use:
      - Remnawave
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    lazy: true

  - name: OpenAI
    type: select
    use:
      - Remnawave
    filter: "(?i)(US|美国|美|LAX|SJC)"

  - name: Claude
    type: select
    use:
      - Remnawave
    filter: "(?i)(US|美国|美|LAX|SJC)"

  - name: Gemini
    type: select
    use:
      - Remnawave
    filter: "(?i)(US|SG|美国|新加坡|LAX|SJC|SIN)"

  - name: YouTube
    type: select
    use:
      - Remnawave

  - name: Google
    type: select
    use:
      - Remnawave

  - name: GitHub
    type: select
    use:
      - Remnawave

  - name: Telegram
    type: select
    use:
      - Remnawave
    filter: "(?i)(SG|KR|US|新加坡|韩国|美国|SIN|GMP|LAX|SJC)"

  - name: PayPal
    type: select
    use:
      - Remnawave
    filter: "(?i)(US|美国|美|LAX|SJC)"

  - name: Final
    type: select
    proxies:
      - DIRECT
    use:
      - Remnawave

